<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusBot - Chatbot Prototype</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a2a6c, #2a4ba0);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chatbot-container {
            width: 100%;
            max-width: 500px;
            height: 80vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(90deg, #0d1b3e, #1a3a8f);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .language-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 5px 10px;
        }

        .language-selector select {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        .language-selector select option {
            color: #333;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f0f4f8;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            position: relative;
            animation: fadeIn 0.3s ease;
            line-height: 1.4;
        }

        .user-message {
            align-self: flex-end;
            background: linear-gradient(90deg, #0d1b3e, #1a3a8f);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .bot-message {
            align-self: flex-start;
            background-color: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-input-container {
            display: flex;
            padding: 15px;
            background-color: white;
            border-top: 1px solid #e0e0e0;
        }

        .chat-input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #1a3a8f;
        }

        .voice-btn, .send-btn {
            background: linear-gradient(90deg, #0d1b3e, #1a3a8f);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            margin-left: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .voice-btn:hover, .send-btn:hover {
            background: linear-gradient(90deg, #1a3a8f, #0d1b3e);
            transform: scale(1.05);
        }

        .voice-btn i, .send-btn i {
            font-size: 18px;
        }

        .typing-indicator {
            align-self: flex-start;
            background-color: white;
            padding: 12px 18px;
            border-radius: 18px;
            border: 1px solid #e0e0e0;
            display: none;
        }

        .typing-indicator span {
            height: 10px;
            width: 10px;
            background: #1a3a8f;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: bounce 1.3s linear infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes bounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-5px);
            }
        }

        @media (max-width: 600px) {
            .chatbot-container {
                height: 90vh;
                border-radius: 15px;
            }
            
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="chatbot-container">
        <div class="chat-header">
            <h1>CampusBot</h1>
            <p>Your multilingual college assistant</p>
            <div class="language-selector">
                <select id="languageSelect">

                    <option value="hi">Hindi</option>

                    <option value="te">Telugu</option>
                </select>
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                Hello! I'm CampusBot. How can I assist you today?
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator">
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <div class="chat-input-container">
            <input type="text" class="chat-input" id="userInput" placeholder="Type your message here...">
            <button class="voice-btn" id="voiceButton">
                <i class="fas fa-microphone"></i>
            </button>
            <button class="send-btn" id="sendButton">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

        let currentLanguage = 'en';
        let recognition;

        // Initialize speech recognition
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = 'en-US';
                
                recognition.onresult = function(event) {
                    const transcript = event.results[0][0].transcript;
                    document.getElementById('userInput').value = transcript;
                    processQuery(transcript);
                };
                
                recognition.onerror = function(event) {
                    console.error('Speech recognition error', event.error);
                };
            }
        }

        // Get response from knowledge base
        function getResponse(query) {
            const lowerQuery = query.toLowerCase();
            
            // Check if we have a response in the knowledge base
            if (knowledgeBase[currentLanguage]) {
                for (const [key, value] of Object.entries(knowledgeBase[currentLanguage])) {
                    if (lowerQuery.includes(key)) {
                        return value;
                    }
                }
            }
            
            // Check English knowledge base as fallback
            if (currentLanguage !== 'en' && knowledgeBase['en']) {
                for (const [key, value] of Object.entries(knowledgeBase['en'])) {
                    if (lowerQuery.includes(key)) {
                        return value;
                    }
                }
            }
            
            return null; // No immediate response found
        }

        // Add message to chat display
        function addMessageToChat(message, isUser = false) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            messageDiv.textContent = message;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Show typing indicator
        function showTypingIndicator() {
            document.getElementById('typingIndicator').style.display = 'block';
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
        }

        // Hide typing indicator
        function hideTypingIndicator() {
            document.getElementById('typingIndicator').style.display = 'none';
        }

        // Process user query
        async function processQuery(query) {
            if (!query.trim()) return;
            
            // Add user message to chat
            addMessageToChat(query, true);
            
            // Clear input
            document.getElementById('userInput').value = '';
            
            // Show typing indicator
            showTypingIndicator();
            
            // Simulate processing delay
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // Get immediate response if available
            const immediateResponse = getResponse(query);
            
            // Hide typing indicator
            hideTypingIndicator();
            
            if (immediateResponse) {
                // Provide immediate response
                addMessageToChat(immediateResponse);
                
                // Speak the response if speech is enabled
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(immediateResponse);
                    utterance.lang = currentLanguage === 'en' ? 'en-US' : `${currentLanguage}-${currentLanguage.toUpperCase()}`;
                    speechSynthesis.speak(utterance);
                }
            } else {
                // Queue for admin response
                addMessageToChat("I don't have information on that right now. Your query has been sent to the administration for response.");
                
                // In a real implementation, you would send this to your backend
                // For now, we'll simulate storing it in localStorage
                const queuedQueries = JSON.parse(localStorage.getItem('queuedQueries') || '[]');
                queuedQueries.push({
                    query: query,
                    language: currentLanguage,
                    timestamp: new Date().toISOString()
                });
                localStorage.setItem('queuedQueries', JSON.stringify(queuedQueries));
                
                // Notify admin (in a real app, this would be a backend notification)
                console.log('New query queued for admin:', query);
            }
        }

        // Set current language
        function setLanguage(lang) {
            currentLanguage = lang;
            
            // Update speech recognition language
            if (recognition) {
                recognition.lang = lang === 'en' ? 'en-US' : `${lang}-${lang.toUpperCase()}`;
            }
        }

        // Start voice input
        function startVoiceInput() {
            if (recognition) {
                recognition.start();
            } else {
                alert('Speech recognition not supported in your browser.');
            }
        }

        // Initialize chatbot
        function initChatbot() {
            initSpeechRecognition();
            
            // Set up event listeners
            document.getElementById('sendButton').addEventListener('click', () => {
                const query = document.getElementById('userInput').value;
                processQuery(query);
            });
            
            document.getElementById('userInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const query = document.getElementById('userInput').value;
                    processQuery(query);
                }
            });
            
            document.getElementById('voiceButton').addEventListener('click', startVoiceInput);
            
            // Language selection
            document.getElementById('languageSelect').addEventListener('change', (e) => {
                setLanguage(e.target.value);
            });
        }

        // Initialize when DOM is loaded
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initChatbot);
        } else {
            initChatbot();
        }
    </script>
</body>
</html>
